<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linde Dashboard Pro v12.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #005596; --danger: #d9534f; --success: #28a745; --warning: #ffc107; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 0.5rem; text-align: center; font-weight: bold; flex-shrink: 0; }
        
        .dashboard { display: flex; gap: 10px; padding: 10px; flex-grow: 1; min-height: 0; overflow-x: auto; }
        
        .panel-side { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; min-width: 250px; flex: 0 0 auto; }
        .panel-center { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; flex: 1 1 auto; min-width: 350px; }
        .panel-right { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; width: auto; min-width: 220px; flex: 0 1 auto; }

        .panel-header { background: #f8f9fa; padding: 8px 12px; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid #eee; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 10px; overflow-y: auto; flex-grow: 1; font-size: 0.8rem; }

        .input-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 2px; }
        input, select { padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        
        .shift-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .btn-shift { background: #e9ecef; border: 1px solid #ccc; padding: 5px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
        .btn-shift:hover { background: var(--primary); color: white; }

        .item-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f0f0f0; align-items: center; gap: 10px; white-space: nowrap; }
        .btn-add { background: var(--success); color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
        .btn-del-db { background: var(--danger); color: white; border: none; padding: 3px 6px; border-radius: 4px; cursor: pointer; display: none; font-size: 0.7rem; }

        .stat-card { background: var(--primary); color: white; border-radius: 6px; padding: 8px; text-align: center; flex: 1; }
        .chart-wrapper { flex-grow: 1; position: relative; min-height: 200px; }
        
        footer { background: #fff; padding: 5px; font-size: 0.7rem; color: #888; text-align: center; border-top: 1px solid #ddd; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>LINDE PERÚ - Proyección de Despachos v1.0</header>

<div class="dashboard">
    <div class="panel-side">
        <div class="panel-header">Ingreso de Datos</div>
        <div class="content">
            <div style="background:#eef2f7; padding:8px; border-radius:6px; margin-bottom:10px;">
                <label><b>Presión del Tanque 500</b></label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="pressInput" placeholder="Lectura de Presión" oninput="convertPressure()">
                    <select id="convFactor" onchange="convertPressure()" style="width:90px;">
                        <option value="1.5">Bar</option>
                        <option value="0.05">mmH2O</option>
                    </select>
                </div>
            </div>

            <div class="input-group"><label>Stock Inicial (TN)</label><input type="number" id="currentStock" value="268" onchange="calculate()"></div>
            <div class="input-group"><label>Producción (TN/h)</label><input type="number" id="prodRate" value="4.424" onchange="calculate()"></div>
            <div class="input-group"><label>Parada de Planta (h)</label><input type="number" id="stopHours" value="0" step="0.5" onchange="calculate()"></div>
            
            <label style="font-weight:bold; color:var(--primary);">Periodos Pre - Establecidos:</label>
            <div class="shift-buttons">
                <button class="btn-shift" onclick="setQuickTime(12)">12h</button>
                <button class="btn-shift" onclick="setQuickTime(24)">24h</button>
                <button class="btn-shift" onclick="setQuickTime(72)">FDS</button>
            </div>

            <div class="input-group"><label>Inicio</label><input type="datetime-local" id="startTime" onchange="calculate()"></div>
            <div class="input-group"><label>Fin</label><input type="datetime-local" id="endTime" onchange="calculate()"></div>
            
            <button onclick="generateReport()" style="width:100%; background:#25D366; color:white; border:none; padding:10px; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:5px;">Generar Reporte</button>
            <div id="reportArea" style="display:none; margin-top:10px;">
                <textarea id="reportTxt" readonly style="width:100%; height:80px; font-size:0.7rem; margin-bottom:5px;"></textarea>
                <button onclick="sendWA()" style="width:100%; background:var(--primary); color:white; border:none; padding:5px; border-radius:4px;">Enviar Ahora</button>
            </div>
        </div>
    </div>

    <div class="panel-center">
        <div class="panel-header">Proyección Producción / Despachos / Stock Final</div>
        <div class="content" style="display:flex; flex-direction:column;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <div class="stat-card"><span>STOCK FINAL</span><span style="font-size:1.4rem; display:block;" id="finalStockDisplay">--</span></div>
                <div class="stat-card" style="background:#333;"><span>TOTAL DE CARGAS</span><span style="font-size:1.4rem; display:block; color:var(--warning);" id="totalLoadsDisplay">--</span></div>
            </div>
            <div id="statusAlert"></div>
            <div class="chart-wrapper"><canvas id="inventoryChart"></canvas></div>
        </div>
    </div>

    <div class="panel-right">
        <div class="panel-header">
            Cisternas
            <button onclick="adminLogin()" style="font-size:0.6rem;">⚙️</button>
        </div>
        <div class="content">
            <div id="adminPanel" style="display:none; background:#fff3cd; padding:8px; border-radius:5px; margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:5px;">
                    <b>ADMINISTRADOR</b> <button onclick="closeAdmin()" style="color:red; border:none; background:none; cursor:pointer;">X</button>
                </div>
                <label>Seleccionar existente:</label>
                <select id="editSelector" onchange="loadCisternToEdit()" style="margin-bottom:5px;"></select>
                <label>O digitar nueva:</label>
                <input type="text" id="editName" placeholder="Nombre de Cisterna" style="margin-bottom:5px;">
                <input type="number" id="editCap" placeholder="Peso TN" style="margin-bottom:5px;">
                <button onclick="updateCistern()" style="width:100%; background:var(--primary); color:white; border:none; border-radius:3px; padding:3px; cursor:pointer;">Actualizar / Crear</button>
            </div>
            <div id="dbList"></div>
            <div class="panel-header" style="margin-top:10px;">Programación de Cargas</div>
            <div id="dispatchList" style="background:#fffef0; padding:5px; border-radius:4px;"></div>
        </div>
    </div>
</div>

<footer>
    <b>Soporte:</b> Jeancarlos Porras Cipriano | <a href="mailto:jeancarlos.porras@linde.com">jeancarlos.porras@linde.com</a> | Linde Perú S.R.L.
</footer>

<script>
    let adminMode = false;
    let cisternData = JSON.parse(localStorage.getItem('linde_db_v10')) || [
        {name: "Ampato", cap: 27.00}, {name: "Aquiles", cap: 20.00}, {name: "Argento", cap: 19.00},
        {name: "Caral", cap: 19.60}, {name: "Centauro", cap: 14.00}, {name: "Chan Chan", cap: 21.60},
        {name: "Chavin", cap: 19.50}, {name: "Chimu", cap: 22.00}, {name: "Colca", cap: 27.00},
        {name: "Ecuador", cap: 19.00}, {name: "Jupiter", cap: 17.00}, {name: "Luna", cap: 22.00},
        {name: "Mantarus", cap: 17.00}, {name: "Mercurio", cap: 19.00}, {name: "Moche", cap: 10.00},
        {name: "Neptuno", cap: 20.50}, {name: "Ollantaytambo", cap: 27.00}, {name: "Orión", cap: 22.85},
        {name: "Pastoruri", cap: 26.00}, {name: "Plutón", cap: 18.00}, {name: "Raura", cap: 24.00},
        {name: "Sagitarius", cap: 17.50}, {name: "Saturno", cap: 17.00}, {name: "Scorpion", cap: 21.00},
        {name: "Sipan", cap: 22.29}, {name: "Taurus", cap: 21.00}, {name: "Titan", cap: 19.00},
        {name: "Urubamba", cap: 26.00}, {name: "Vilcanota", cap: 26.00}, {name: "Wari", cap: 24.00}
    ];

    let selectedTrips = [];
    let myChart;

    window.onload = () => {
        setQuickTime(12);
        initChart();
        renderDB();
        calculate();
    };

    function setQuickTime(hours) {
        const now = new Date();
        const future = new Date(now.getTime() + hours * 60 * 60 * 1000);
        const format = (d) => d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+'T'+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
        document.getElementById('startTime').value = format(now);
        document.getElementById('endTime').value = format(future);
        calculate();
    }

    function adminLogin() {
        if(prompt("Clave Admin:") === "Linde2026") {
            adminMode = true;
            document.getElementById('adminPanel').style.display = 'block';
            populateSelector();
            renderDB();
        }
    }

    function populateSelector() {
        const sel = document.getElementById('editSelector');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        cisternData.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
    }

    function closeAdmin() { 
        adminMode = false;
        document.getElementById('adminPanel').style.display = 'none'; 
        renderDB();
    }

    function loadCisternToEdit() {
        const name = document.getElementById('editSelector').value;
        const item = cisternData.find(c => c.name === name);
        if(item) {
            document.getElementById('editName').value = item.name;
            document.getElementById('editCap').value = item.cap;
        }
    }

    function updateCistern() {
        const name = document.getElementById('editName').value.trim();
        const cap = parseFloat(document.getElementById('editCap').value);
        if(name && !isNaN(cap)) {
            const itemIndex = cisternData.findIndex(c => c.name.toLowerCase() === name.toLowerCase());
            if(itemIndex > -1) cisternData[itemIndex].cap = cap;
            else cisternData.push({name, cap});
            localStorage.setItem('linde_db_v10', JSON.stringify(cisternData));
            renderDB();
            populateSelector();
            alert("Base de datos actualizada.");
        }
    }

    function deleteCistern(index) {
        if(confirm(`¿Estás seguro de eliminar "${cisternData[index].name}"?`)) {
            cisternData.splice(index, 1);
            localStorage.setItem('linde_db_v10', JSON.stringify(cisternData));
            renderDB();
            populateSelector();
        }
    }

    function renderDB() {
        const list = document.getElementById('dbList');
        list.innerHTML = '';
        cisternData.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, idx) => {
            list.innerHTML += `
                <div class="item-row">
                    <span>${c.name} (<b>${c.cap}</b>)</span>
                    <div>
                        <button class="btn-del-db" style="display:${adminMode ? 'inline-block' : 'none'}" onclick="deleteCistern(${idx})">🗑️</button>
                        <button class="btn-add" onclick="addTrip('${c.name}', ${c.cap})">+</button>
                    </div>
                </div>`;
        });
    }

    function addTrip(name, cap) {
        selectedTrips.push({ name, cap, id: Date.now() });
        renderDispatch();
        calculate();
    }

    function renderDispatch() {
        document.getElementById('dispatchList').innerHTML = selectedTrips.map(t => `<div class="item-row"><span>🚢 ${t.name}</span><button onclick="removeTrip(${t.id})" style="border:none; background:none; cursor:pointer;">❌</button></div>`).join('');
    }

    function removeTrip(id) {
        selectedTrips = selectedTrips.filter(t => t.id !== id);
        renderDispatch();
        calculate();
    }

    function calculate() {
        const stockActual = parseFloat(document.getElementById('currentStock').value) || 0;
        const prodRate = parseFloat(document.getElementById('prodRate').value) || 0;
        const stopHours = parseFloat(document.getElementById('stopHours').value) || 0;
        const totalHours = (new Date(document.getElementById('endTime').value) - new Date(document.getElementById('startTime').value)) / 36e5;
        
        // El tiempo efectivo de producción es el tiempo total menos el tiempo de parada
        const prodHours = Math.max(0, totalHours - stopHours);
        const totalProd = prodHours > 0 ? prodHours * prodRate : 0;
        const totalOut = selectedTrips.reduce((s, t) => s + t.cap, 0);
        const finalStock = stockActual + totalProd - totalOut;

        document.getElementById('finalStockDisplay').innerText = finalStock.toFixed(1);
        document.getElementById('totalLoadsDisplay').innerText = totalOut.toFixed(1) + " TN";
        
        const alertDiv = document.getElementById('statusAlert');
        alertDiv.innerHTML = finalStock < 50 ? '<div style="background:#f8d7da; color:#721c24; padding:5px; border-radius:4px; font-weight:bold; font-size:0.7rem; text-align:center; animation:blink 1s infinite;">¡ALERTA STOCK BAJO!</div>' : '<div style="background:#d4edda; color:#155724; padding:5px; border-radius:4px; font-size:0.7rem; text-align:center;">OPERACIÓN NORMAL</div>';

        if(myChart) {
            myChart.data.datasets[0].data = [stockActual, totalProd, totalOut, Math.max(0, finalStock)];
            myChart.update();
        }
    }

    function initChart() {
        const ctx = document.getElementById('inventoryChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['Inicial', 'Prod', 'Despacho', 'Final'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#6c757d', '#28a745', '#d9534f', '#005596'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function convertPressure() {
        const val = parseFloat(document.getElementById('pressInput').value) || 0;
        const factor = parseFloat(document.getElementById('convFactor').value);
        document.getElementById('currentStock').value = (val * factor).toFixed(2);
        calculate();
    }

    function generateReport() {
        const start = document.getElementById('startTime').value.replace('T', ' ');
        const end = document.getElementById('endTime').value.replace('T', ' ');
        const stopHours = document.getElementById('stopHours').value || 0;
        const msg = `📋 *PROYECCIÓN DE RETIROS*\n📅 *Periodo:* ${start} a ${end}\n🛑 *Parada de Planta:* ${stopHours} h\nStock Final: ${document.getElementById('finalStockDisplay').innerText} TN\nCisternas: ${selectedTrips.length}\nTotal Despachado: ${document.getElementById('totalLoadsDisplay').innerText}`;
        document.getElementById('reportTxt').value = msg;
        document.getElementById('reportArea').style.display = 'block';
    }

    function sendWA() { window.open(`https://wa.me/?text=${encodeURIComponent(document.getElementById('reportTxt').value)}`, '_blank'); }
</script>
</body>
</html>
